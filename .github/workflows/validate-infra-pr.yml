# validate-infra-pr.yml — validates infra-updater pull requests
# Deployed by the infra-updater to downstream repos. Plain .yml — never .j2.
# Source: rwaight/infra, path: infra/file-sync/gh_workflows/validate-infra-pr.yml
# Last-reviewed: 2026-06
#
# IMPORTANT: This workflow only executes from the BASE branch (GitHub's rule for
# pull_request triggers). The FIRST infra-updater PR that deploys this file to a
# downstream repo will NOT be validated by it — that PR requires manual review.
# Automated validation begins on the SECOND infra-updater run per repo (after this
# file has merged to the default branch).

name: Validate infra-updater PR
run-name: "Validate infra-updater PR: ${{ github.head_ref }}"

on:
  pull_request:
    branches: [main]
    # 'closed' is added so the cleanup job can delete the branch after merge.
    # Validate and auto-merge jobs guard against running on closed events via their if: conditions.
    types: [opened, synchronize, reopened, closed]

# Cancel in-progress runs on rapid re-pushes; let bot runs complete uninterrupted.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.actor != 'rw-actions-bot[bot]' }}

jobs:

  validate-infra-pr:
    name: Validate manifest and checksums
    runs-on: ubuntu-latest
    # ~10 min validate + auto-merge registration (fast API call, not blocking); 15 for headroom.
    timeout-minutes: 15
    # Only run for open/updated PRs from the infra-updater (not on PR close).
    if: |
      github.event.action != 'closed' &&
      startsWith(github.head_ref, 'ci/infra-update-')
    permissions:
      # contents: write required for the auto-merge step (gh pr merge).
      # Elevated from 'read' because auto-merge is opt-in via vars.INFRA_AUTO_MERGE.
      contents: write
      pull-requests: write

    steps:

      - name: Checkout PR branch
        # Verified creator: https://github.com/marketplace/actions/checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Validate manifest and file checksums
        id: validate
        run: |
          python3 - << 'PYEOF'
          import hashlib
          import json
          import os
          import subprocess
          import sys

          MANIFEST = "assets/infra-updater-manifest.json"

          # ── Read manifest ──────────────────────────────────────────────────────

          if not os.path.exists(MANIFEST):
              print(f"::error::Manifest not found: {MANIFEST}")
              print("The infra-updater manifest was not committed in this PR.")
              print("This may mean the PR was opened by an older version of the updater.")
              sys.exit(1)

          with open(MANIFEST) as fh:
              manifest = json.load(fh)

          manifest_entries = manifest.get("files", [])
          # Split into hashed (normal) and deleted entries.
          # Older manifests have no "deleted" key — treat all entries as hashed.
          manifest_hashed = {
              e["path"]: e["sha256"]
              for e in manifest_entries
              if not e.get("deleted")
          }
          manifest_deleted = {
              e["path"]
              for e in manifest_entries
              if e.get("deleted")
          }
          # manifest_all is used for "NOT IN MANIFEST" gate: both hashed and
          # deleted files are expected changes authored by the infra-updater.
          manifest_all = set(manifest_hashed) | manifest_deleted

          print(f"Manifest: {len(manifest_hashed)} files hashed, {len(manifest_deleted)} deleted")
          print(f"  source_sha:    {manifest.get('source_sha', 'unknown')}")
          print(f"  source_run_id: {manifest.get('source_run_id', 'unknown')}")
          print(f"  generated_at:  {manifest.get('generated_at', 'unknown')}")
          print()

          # ── Validate SHA256 checksums ──────────────────────────────────────────

          errors = []

          for rel_path, expected_sha in manifest_hashed.items():
              if not os.path.exists(rel_path):
                  errors.append(f"MISSING  {rel_path}")
                  continue
              actual = hashlib.sha256(open(rel_path, "rb").read()).hexdigest()
              if actual != expected_sha:
                  errors.append(
                      f"MISMATCH {rel_path}\n"
                      f"         expected: {expected_sha}\n"
                      f"         actual:   {actual}"
                  )
              else:
                  print(f"  OK  {rel_path}")

          # ── Validate deleted entries are actually absent ───────────────────────
          # If a manifest entry is marked deleted but the file still exists, that
          # suggests the cleanup step did not run correctly.

          for rel_path in manifest_deleted:
              if os.path.exists(rel_path):
                  errors.append(f"SHOULD BE DELETED BUT EXISTS  {rel_path}")
              else:
                  print(f"  DELETED  {rel_path}")

          # ── Check no PR diff files are absent from manifest ────────────────────
          # Every file changed in this PR (except the manifest itself) must appear
          # in the manifest. An absent file indicates a stale or accumulated commit
          # that was not part of the infra-updater run that generated the manifest.

          result = subprocess.run(
              ["git", "diff", "--name-only", "origin/main...HEAD"],
              capture_output=True,
              text=True,
              check=True,
          )
          diff_files = [f.strip() for f in result.stdout.splitlines() if f.strip()]

          for diff_path in diff_files:
              # Normalize: strip only a leading './' prefix (two-char sequence).
              # Do NOT use lstrip("./") — that strips characters from a set and would
              # incorrectly convert '.github/...' → 'github/...' making comparisons fail.
              if diff_path.startswith("./"):
                  diff_path = diff_path[2:]
              # Manifest file excludes itself — skip it here too.
              if diff_path == MANIFEST:
                  continue
              if diff_path not in manifest_all:
                  errors.append(f"NOT IN MANIFEST  {diff_path}")

          # ── Report ─────────────────────────────────────────────────────────────

          print()
          if errors:
              print(f"::error::Manifest validation FAILED ({len(errors)} error(s)):")
              for err in errors:
                  print(f"  {err}")
              sys.exit(1)
          else:
              print(
                  f"✓ Manifest validation passed: {len(manifest_hashed)} files verified, "
                  f"{len(manifest_deleted)} deletions confirmed"
              )
          PYEOF

      - name: Find existing PR log comment
        if: always()
        id: find-comment
        uses: rwaight/actions/chatops/find-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- infra-updater-pr-log -->"
          direction: last

      - name: Compute comment variables
        if: always()
        id: comment-vars
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
          if [[ -z "${{ steps.find-comment.outputs.comment-id }}" ]]; then
            echo "is_new=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=" >> "$GITHUB_OUTPUT"
          fi

      - name: Render comment template
        if: always()
        id: comment-template
        uses: rwaight/actions/utilities/render-template@df0be96950b731ff07e32af1c7f72e2deb38539b # v0.2.6
        with:
          template: assets/validate-infra-pr/pr-log-validate.md
          vars: |
            is_new: ${{ steps.comment-vars.outputs.is_new }}
            outcome: ${{ steps.validate.outcome }}
            run_number: ${{ github.run_number }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            timestamp: ${{ steps.comment-vars.outputs.timestamp }}

      - name: Post validation result comment
        if: always()
        uses: rwaight/actions/chatops/create-or-update-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: ${{ steps.comment-template.outputs.result }}
          edit-mode: append
          append-separator: newline

  # ── Auto-merge (opt-in per repo) ──────────────────────────────────────────────
  # Steps below are skipped when vars.INFRA_AUTO_MERGE != 'true'.
  # Merged into this job (was a separate job) to save one runner startup per run.
  # REQUIRES: The downstream repo must have INFRA_AUTO_MERGE='true' set as a
  # GitHub Actions repository variable. This variable is managed by Terraform —
  # see infra/github/repos/<repo>.json ("infra-workflows": {"auto-merge": true}).

      - name: Auto-merge downstream infra-updater PR
        id: merge
        if: vars.INFRA_AUTO_MERGE == 'true'
        # '--auto' waits for all required branch-protection checks before merging.
        # '--squash' keeps the default branch history clean (one commit per updater run).
        # '--delete-branch' cleans up the ci/infra-update-* branch after merge.
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash --delete-branch --auto \
            --subject "ci: infra files update (auto-merge)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find existing PR log comment (merge)
        if: always() && vars.INFRA_AUTO_MERGE == 'true'
        id: find-comment-merge
        uses: rwaight/actions/chatops/find-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- infra-updater-pr-log -->"
          direction: last

      - name: Compute comment variables (merge)
        if: always() && vars.INFRA_AUTO_MERGE == 'true'
        id: comment-vars-merge
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
          if [[ -z "${{ steps.find-comment-merge.outputs.comment-id }}" ]]; then
            echo "is_new=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=" >> "$GITHUB_OUTPUT"
          fi

      - name: Render comment template (merge)
        if: always() && vars.INFRA_AUTO_MERGE == 'true'
        id: comment-template-merge
        uses: rwaight/actions/utilities/render-template@df0be96950b731ff07e32af1c7f72e2deb38539b # v0.2.6
        with:
          template: assets/validate-infra-pr/pr-log-merge.md
          vars: |
            is_new: ${{ steps.comment-vars-merge.outputs.is_new }}
            outcome: ${{ steps.merge.outcome }}
            run_number: ${{ github.run_number }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            timestamp: ${{ steps.comment-vars-merge.outputs.timestamp }}

      - name: Post auto-merge triggered comment
        if: always() && vars.INFRA_AUTO_MERGE == 'true'
        uses: rwaight/actions/chatops/create-or-update-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment-merge.outputs.comment-id }}
          body: ${{ steps.comment-template-merge.outputs.result }}
          edit-mode: append
          append-separator: newline

  # ── Cleanup (always) ──────────────────────────────────────────────────────────
  # Deletes the ci/infra-update-* branch after the PR is merged, whether the
  # merge was performed manually by a reviewer or via the auto-merge job above.
  # This prevents stale remote tracking refs from causing --force-with-lease
  # failures on the next infra-updater run targeting the same repo.

  cleanup:
    name: Delete infra-updater branch after merge
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: |
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      startsWith(github.head_ref, 'ci/infra-update-')
    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Delete branch ${{ github.head_ref }}
        id: delete-branch
        run: |
          gh api \
            --method DELETE \
            "repos/${{ github.repository }}/git/refs/heads/${{ github.head_ref }}" \
            || echo "Branch already deleted (auto-merge may have removed it)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find existing PR log comment
        if: always()
        id: find-comment
        uses: rwaight/actions/chatops/find-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: "<!-- infra-updater-pr-log -->"
          direction: last

      - name: Compute comment variables
        if: always()
        id: comment-vars
        run: |
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"
          if [[ -z "${{ steps.find-comment.outputs.comment-id }}" ]]; then
            echo "is_new=yes" >> "$GITHUB_OUTPUT"
          else
            echo "is_new=" >> "$GITHUB_OUTPUT"
          fi

      - name: Render comment template
        if: always()
        id: comment-template
        uses: rwaight/actions/utilities/render-template@df0be96950b731ff07e32af1c7f72e2deb38539b # v0.2.6
        with:
          template: assets/validate-infra-pr/pr-log-cleanup.md
          vars: |
            is_new: ${{ steps.comment-vars.outputs.is_new }}
            branch_name: ${{ github.head_ref }}
            run_number: ${{ github.run_number }}
            run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            timestamp: ${{ steps.comment-vars.outputs.timestamp }}

      - name: Post branch cleanup comment
        if: always()
        uses: rwaight/actions/chatops/create-or-update-comment@v0.2.6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          body: ${{ steps.comment-template.outputs.result }}
          edit-mode: append
          append-separator: newline
